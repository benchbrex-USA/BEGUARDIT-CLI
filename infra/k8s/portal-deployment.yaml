# BeGuardit Portal — Deployment + Service (§14.3)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beguardit-portal
  namespace: beguardit
  labels:
    app.kubernetes.io/name: beguardit-portal
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: beguardit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: beguardit-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beguardit-portal
        app.kubernetes.io/component: portal
        app.kubernetes.io/part-of: beguardit
    spec:
      containers:
        - name: portal
          image: ghcr.io/beguardit/portal:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: beguardit-portal
  namespace: beguardit
  labels:
    app.kubernetes.io/name: beguardit-portal
    app.kubernetes.io/component: portal
    app.kubernetes.io/part-of: beguardit
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: beguardit-portal
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
