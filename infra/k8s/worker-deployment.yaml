# BeGuardit Worker — Deployment (§14.3)
# No Service needed: the worker pulls jobs from Redis, it does not accept inbound traffic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beguardit-worker
  namespace: beguardit
  labels:
    app.kubernetes.io/name: beguardit-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: beguardit
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beguardit-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beguardit-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: beguardit
    spec:
      containers:
        - name: worker
          image: ghcr.io/beguardit/worker:latest
          command: ["arq", "src.main.WorkerSettings"]
          envFrom:
            - secretRef:
                name: beguardit-secrets
          env:
            - name: STORAGE_BACKEND
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: STORAGE_BACKEND
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_BUCKET
                  optional: true
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_REGION
                  optional: true
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_ENDPOINT_URL
                  optional: true
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_ACCESS_KEY_ID
                  optional: true
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_SECRET_ACCESS_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: report-data
              mountPath: /data/reports
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      volumes:
        - name: report-data
          persistentVolumeClaim:
            claimName: beguardit-reports
      restartPolicy: Always
