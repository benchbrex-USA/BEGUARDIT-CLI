# BeGuardit API — Deployment + Service (§14.3)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beguardit-api
  namespace: beguardit
  labels:
    app.kubernetes.io/name: beguardit-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: beguardit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: beguardit-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beguardit-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: beguardit
    spec:
      containers:
        - name: api
          image: ghcr.io/beguardit/api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: beguardit-secrets
          env:
            - name: STORAGE_BACKEND
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: STORAGE_BACKEND
                  optional: true
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_BUCKET
                  optional: true
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_REGION
                  optional: true
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_ENDPOINT_URL
                  optional: true
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_ACCESS_KEY_ID
                  optional: true
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: beguardit-secrets
                  key: S3_SECRET_ACCESS_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: beguardit-api
  namespace: beguardit
  labels:
    app.kubernetes.io/name: beguardit-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: beguardit
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: beguardit-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
