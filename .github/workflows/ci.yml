# CI — lint + test on every pull request (§13.2)
#
# Jobs:
#   lint         — ruff (Python), tsc (portal type-check)
#   test-api     — pytest with PostgreSQL 16 + Redis 7 service containers
#   test-worker  — pytest for ARQ worker
#   test-cli     — vitest for Node.js CLI
#   test-portal  — tsc type-check + vite build
#   security     — pip-audit, npm audit

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python lint
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check (api)
        run: ruff check api/src/ --output-format=github
      - name: Ruff check (worker)
        run: ruff check worker/src/ --output-format=github

      # TypeScript type-check
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install portal deps
        working-directory: portal
        run: npm install
      - name: TypeScript type-check (portal)
        working-directory: portal
        run: npx tsc --noEmit

  # ── Test API ──────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beguardit_test
          POSTGRES_USER: bg_test
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bg_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://bg_test:test_password@localhost:5432/beguardit_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install API dependencies
        run: pip install -r requirements.txt
        working-directory: api
      - name: Initialize test database
        run: psql -h localhost -U bg_test -d beguardit_test -f infra/db/schema.sql
        env:
          PGPASSWORD: test_password
      - name: Run API tests
        run: pytest tests/ -v --tb=short
        working-directory: api

  # ── Test Worker ───────────────────────────────────────────────────
  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beguardit_test
          POSTGRES_USER: bg_test
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bg_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://bg_test:test_password@localhost:5432/beguardit_test
      REDIS_URL: redis://localhost:6379/0
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: worker/requirements.txt
      - name: Install worker dependencies
        run: pip install -r requirements.txt
        working-directory: worker
      - name: Initialize test database
        run: psql -h localhost -U bg_test -d beguardit_test -f infra/db/schema.sql
        env:
          PGPASSWORD: test_password
      - name: Run worker tests
        run: pytest tests/ -v --tb=short
        working-directory: worker

  # ── Test CLI ──────────────────────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci
      - name: Run CLI tests
        working-directory: cli
        run: npm test

  # ── Test Portal ───────────────────────────────────────────────────
  test-portal:
    name: Test Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install portal dependencies
        working-directory: portal
        run: npm install
      - name: TypeScript type-check
        working-directory: portal
        run: npx tsc --noEmit
      - name: Build portal
        working-directory: portal
        run: npx vite build

  # ── Security ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python dependency audit
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Audit API dependencies
        run: pip install pip-audit && pip-audit -r api/requirements.txt || true
      - name: Audit worker dependencies
        run: pip-audit -r worker/requirements.txt || true

      # Node dependency audit
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit CLI dependencies
        working-directory: cli
        run: npm ci && npm audit --audit-level=high || true
      - name: Audit portal dependencies
        working-directory: portal
        run: npm install && npm audit --audit-level=high || true
