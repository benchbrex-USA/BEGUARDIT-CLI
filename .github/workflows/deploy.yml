name: Deploy

# Manual trigger only until deployment infrastructure is ready.
# Once staging/prod environments exist, re-enable push trigger:
#   push:
#     branches: [main]
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

